name: CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: flake8
        run: |
          # Premier run : Arrêt sur erreurs critiques
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Deuxième run : Ne pas bloquer (exit 0) pour le reste
          flake8 . --count --exit-zero --statistics

      - name: pytest
        run: |
          # PYTHONPATH=. permet à pytest de trouver le fichier app.py à la racine
          PYTHONPATH=. pytest tests/

  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: trivy FS mode
        # On utilise v0.35.0 au lieu de 0.33.1 pour éviter le malware de mars 2026
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: upload
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'results.sarif'